<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Login | MyArticles</title>

  <!-- FONT -->
  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link
    rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin
  >

  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap"
    rel="stylesheet"
  >

  <!-- CSS -->
  <link
    rel="stylesheet"
    href="css/login.css"
  >
</head>

<body>

  <!-- SHAPE -->
  <div class="shape shape1"></div>
  <div class="shape shape2"></div>

  <!-- LOGIN CONTAINER -->
  <section class="login-container">

    <!-- LEFT -->
    <div class="login-left">

      <span class="tag">
        ✦ Welcome Back
      </span>

      <h1>
        Selamat
        <br>
        Datang
      </h1>

      <p>
        Masuk kembali ke MyArticles
        dan lanjutkan menulis artikel
        favoritmu dengan tampilan modern.
      </p>

      <div class="floating-icon">
        📚
      </div>

    </div>

    <!-- RIGHT -->
    <div class="login-right">

      <!-- FORM -->
      <form id="loginForm">

        <h2>
          Login
        </h2>

        <!-- USERNAME -->
        <div class="input-box">

          <label>
            Username
          </label>

          <input
            type="text"
            id="username"
            placeholder="Masukkan username..."
          >

        </div>

        <!-- PASSWORD -->
        <div class="input-box password-box">

  <label>
    Password
  </label>

  <div class="password-wrapper">

    <input
      type="password"
      id="password"
      placeholder="Masukkan password..."
    >

    <button
      type="button"
      class="toggle-password"
      onclick="togglePassword()"
    >
      👁️
    </button>

  </div>
</div>

        <!-- BUTTON -->
        <button type="submit">
          Masuk
        </button>

        <p class="bottom-text">
         Gunakan akun admin untuk masuk
        </p>

        <!-- BACK -->
        <a
          href="cover.html"
          class="back-home"
        >
          ← Back
        </a>

      </form>

    </div>

  </section>

  <!-- JS -->
  <script src="js/login.js"></script>

</body>
</html>
