<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skills | Fadlilatul Muna</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<!-- FONT AWESOME -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<link rel="stylesheet" href="css/skills.css">
</head>

<body>

<div class="wrapper">

<!-- HEADER -->
<header>
  <img src="img/fadilamuna.jpeg" alt="Foto">
  <h1>Skills</h1>
  <p class="desc">Skill yang saya kuasai</p>
</header>

<!-- SKILLS LIST -->
<div class="container">

  <!-- HTML -->
  <div class="card">
    <i class="fa-brands fa-html5"></i>

    <div class="skill-info">
      <h3>HTML</h3>
      <div class="bar">
        <div class="progress html"></div>
        <span class="percent">90%</span>
      </div>
    </div>
  </div>

  <!-- CSS -->
  <div class="card">
    <i class="fa-brands fa-css3-alt"></i>

    <div class="skill-info">
      <h3>CSS</h3>
      <div class="bar">
        <div class="progress css"></div>
        <span class="percent">85%</span>
      </div>
    </div>
  </div>

  <!-- EXCEL -->
  <div class="card">
    <i class="fa-solid fa-file-excel"></i>

    <div class="skill-info">
      <h3>Microsoft Excel</h3>
      <div class="bar">
        <div class="progress excel"></div>
        <span class="percent">90%</span>
      </div>
    </div>
  </div>

  <!-- POM QM -->
  <div class="card">
    <i class="fa-solid fa-chart-line"></i>

    <div class="skill-info">
      <h3>POM QM</h3>
      <div class="bar">
        <div class="progress pom"></div>
        <span class="percent">80%</span>
      </div>
    </div>
  </div>

  <!-- ALGORITMA & LOGIKA -->
  <div class="card">
    <i class="fa-solid fa-code"></i>

    <div class="skill-info">
      <h3>Algoritma & Logika</h3>
      <div class="bar">
        <div class="progress algo"></div>
        <span class="percent">95%</span>
      </div>
    </div>
  </div>

  <!-- PROBLEM SOLVING -->
  <div class="card">
    <i class="fa-solid fa-lightbulb"></i>

    <div class="skill-info">
      <h3>Problem Solving</h3>
      <div class="bar">
        <div class="progress problem"></div>
        <span class="percent">90%</span>
      </div>
    </div>
  </div>

</div>

<!-- BACK BUTTON -->
<div class="back">
  <a href="beranda.html">← Back</a>
</div>

</div>

</body>
</html>
